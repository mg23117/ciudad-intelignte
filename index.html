<!DOCTYPE html>
<htm lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>La camara de los 5 desafios</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>
        <div class="container py-4">
            <header class="text-center mb-4">
                <h1>La camara de los 5 desafios</h1>
                <p class="lead">Debes superar los 5 niveles para poder restaurar el acceso</p>
                <div class="progress" style="height: 30px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped" role="progressbar"
                        style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                        0%
                    </div>
                </div>
            </header>

            <!-- El nivel 1 -->
            <div id="nivel1" class="nivel-section">
                <h2>Nivel 1: El Guardián de la Ubicación</h2>
                <p>Para poder continuar, debes proporcionar tu ubicación actual.</p>

                <div class="card mb-3">
                    <div class="card-body">
                        <button id="btnObtenerUbicacion" class="btn btn-primary">
                            Obtener ubicación
                        </button>
                        <hr>
                        <div class="infoUbicacion">
                            <p><strong>Latitud:</strong> <span id="lat">—</span></p>
                            <p><strong>Longitud:</strong> <span id="lng">—</span></p>
                        </div>
                        <div id="mensajeUbicacion" class="mt-2"></div>
                    </div>
                </div>

                <button id="btnSiguienteNivel1" class="btn btn-success" disabled>
                    Siguiente nivel
                </button>

                <!-- aqui van air los otros niveles -->
            </div>

            <div id="nivel2" class="nivel-section d-none">
                <h2>Nivel 2: El Cartógrafo Perdido</h2>
                <p>Próximamente...</p>
                <!-- Aquí irá el canvas y los elementos del nivel 2 -->
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/nivel1.js"></script>
        <script src="js/app.js"></script>
    </body>
</htm>
